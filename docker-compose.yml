# ─── Local Docker Compose ────────────────────────────────────────────────────
# Spins up PostgreSQL locally for development.
# Production → point DATABASE_URL at Neon cloud.
#
# Usage:
#   docker compose up -d       # start postgres in background
#   docker compose down        # stop
#   docker compose down -v     # stop + delete volume (wipes data)

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Odoo_May26   # TODO: rename to match your app
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
